<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/static/account/css/style.css">
</head>
<body>
    <h1>Регистрация</h1>

    <form id="regForm" onsubmit="handleRegister(event)">
        <div class="form-group">
            <label for="login">Логин:</label>
            <input type="text" id="login" required>
        </div>

        <div class="form-group">
            <label for="password">Пароль:</label>
            <div class="password-wrapper">
                <input type="password" id="password" required>
                <button type="button" class="toggle-password" onclick="togglePass('password')">👁️</button>
            </div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Повторите пароль:</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" required>
                <button type="button" class="toggle-password" onclick="togglePass('confirmPassword')">👁️</button>
            </div>
        </div>

        <button type="submit" id="regBtn">Зарегистрироваться</button>

        <div id="error-message" class="error-text"></div>
        
        <div class="login-redirect" style="margin-top: 15px; text-align: center;">
            Уже есть аккаунт? <a href="/login/">Войти</a>
        </div>
    </form>

    <script src="/static/js/request.js"></script>
    
    <script>
        function togglePass(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === "password" ? "text" : "password";
        }

        async function handleRegister(event) {
            event.preventDefault();

            const login = document.getElementById('login').value;
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const errorElement = document.getElementById('error-message');

            errorElement.textContent = "";

            if (pass !== confirmPass) {
                errorElement.textContent = "Пароли не совпадают!";
                return;
            }

            const urlPath = `/registration/`;
            const regData = { login: login, password: pass };

            try {
                const response = await loadData('POST', urlPath, regData); 
                window.location.href = "/"; 
            } catch (error) {
                errorElement.textContent = error.message || "Произошла ошибка при регистрации";
            }
        }
    </script>
</body>
</html>
