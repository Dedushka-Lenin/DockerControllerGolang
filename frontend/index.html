<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Controller</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>

    <header class="main-header">
        <button id="btn-create" class="btn btn-success" type="button">Создать контейнер</button>
        <button id="btn-logout" class="btn btn-danger" type="button">Выйти из аккаунта</button>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <h2>Контейнеры</h2>
            <ul id="containers-list" class="list-group">
                <li class="loading">Загрузка...</li>
            </ul>
        </aside>

        <!-- ИСПРАВЛЕНО: Удален первый дублирующийся блок, оставлен только этот, полный -->
        <main id="control-panel" class="control-panel hidden" aria-hidden="true">
            <h3 id="selected-container-title">Управление</h3>
            
            <nav class="control-tabs">
                <button id="btn-tab-container" class="btn btn-tab active" type="button">Container</button>
                <button id="btn-tab-logs" class="btn btn-tab" type="button">Logs</button>
                <button id="btn-tab-console" class="btn btn-tab" type="button">Console</button>
            </nav>

            <div class="tab-content">
                <!-- 1. Панель управления контейнером -->
                <section id="pane-container" class="pane">
                    <div class="status-block">
                        <span>Статус:</span>
                        <span id="container-status" class="status-badge">Загрузка...</span>
                    </div>
                    <div class="action-zone">
                        <button id="btn-action-toggle" class="btn" type="button">Определяется...</button>
                        <button id="btn-action-restart" class="btn btn-warning" type="button">Перезапустить</button>
                        <button id="btn-action-delete" class="btn btn-danger" type="button">Удалить</button>
                    </div>
                </section>

                <!-- 2. Панель Логов -->
                <section id="pane-logs" class="pane hidden" aria-hidden="true">
                    <div class="terminal-header">
                        <span>Логи контейнера</span>
                        <button id="btn-refresh-logs" class="btn btn-secondary btn-sm" type="button">Обновить</button>
                    </div>
                    <pre id="logs-output" class="terminal-viewer">Ожидание запроса...</pre>
                </section>

                <!-- 3. Панель Консоли -->
                <section id="pane-console" class="pane hidden" aria-hidden="true">
                    <div class="terminal-header">Интерактивная консоль</div>
                    <div class="terminal-viewer console-wrapper">
                        <div id="console-output">Подключение к терминалу...</div>
                        <div class="console-input-line">
                            <span class="prompt">#</span>
                            <input type="text" id="input-console" placeholder="Введите команду..." autocomplete="off">
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Модальное окно: Создание -->
    <div id="modal-create" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
        <section class="modal-window">
            <header class="modal-header">
                <h3 id="modal-title">Создать контейнер</h3>
                <button id="btn-modal-close" class="btn-close" type="button" aria-label="Закрыть модальное окно">&times;</button>
            </header>
            
            <div class="modal-body">
                <div class="form-group">
                    <label for="input-name">Название контейнера</label>
                    <input type="text" id="input-name" placeholder="например, my-web-app" required>
                </div>

                <div class="form-group">
                    <label for="input-url">URL-адрес образа</label>
                    <input type="text" id="input-url" placeholder="например, library/ubuntu:latest" required>
                </div>

                <div id="modal-error" class="error-message hidden" role="alert"></div>
            </div>

            <footer class="modal-footer">
                <button id="btn-modal-submit" class="btn btn-success" type="button">Создать</button>
            </footer>
        </section>
    </div>

    <!-- Модальное окно: Удаление -->
    <div id="modal-delete" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-delete-title" aria-hidden="true">
        <section class="modal-window">
            <header class="modal-header">
                <h3 id="modal-delete-title">Подтверждение удаления</h3>
                <!-- ИСПРАВЛЕНО: Изменено id с btn-delete-close на соответствие скрипту btn-delete-close -->
                <button id="btn-delete-close" class="btn-close" type="button" aria-label="Отмена">&times;</button>
            </header>
            <div class="modal-body">
                <p>Вы уверены, что хотите безвозвратно удалить контейнер <strong id="delete-container-name"></strong>?</p>
                <div id="modal-delete-error" class="error-message hidden" role="alert"></div>
            </div>
            <footer class="modal-footer" style="gap: 10px;">
                <button id="btn-delete-cancel" class="btn btn-secondary" type="button">Отмена</button>
                <button id="btn-delete-confirm" class="btn btn-danger" type="button">Да, удалить</button>
            </footer>
        </section>
    </div>

    <script src="/static/js/request.js" defer></script>
    <script src="/static/js/main.js" defer></script>
</body>
</html>
